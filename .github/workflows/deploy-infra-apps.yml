

name: Deploy Infra and Apps (GCP Cloud Run Suite)

# --- Test GCP Auth Job ---
on:
  workflow_dispatch:
    # Allows manual trigger for auth test

jobs:
  test_gcp_auth:
    name: Test GCP Auth
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: List gcloud auth accounts
        run: gcloud auth list


permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api-app/**'
      - 'web-app/**'
      - 'batch-app/**'
      - '.github/workflows/deploy-infra-apps.yml'
  workflow_dispatch:


jobs:
  set_image_tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - id: set_tag
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


  build_push_web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: set_image_tag
    env:
      IMAGE_TAG: ${{ needs.set_image_tag.outputs.image_tag }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to GAR
        run: gcloud auth configure-docker gcr.io
      - name: Set short image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Authenticate Docker to gcr.io
      #   run: gcloud auth configure-docker gcr.io
      # --- JFrog Artifactory build & push (commented for future use) ---
      # - name: Log in to JFrog Artifactory Docker registry
      #   run: |
      #     JF_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed 's~https\?://~~')
      #     echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
      #     echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      # - name: Build & Tag Web Image for JFrog
      #   run: docker build -t $JF_REGISTRY/ceosvr-docker/web-app:$IMAGE_TAG ./web-app
      # - name: Push Web Image to JFrog
      #   run: docker push $JF_REGISTRY/ceosvr-docker/web-app:$IMAGE_TAG
      # --- End JFrog steps ---
      - name: Build & Tag Web Image for GAR
        run: docker build -t gcr.io/gifted-palace-468618-q5/web-app:$IMAGE_TAG ./web-app
      - name: Push Web Image to GAR
        run: docker push gcr.io/gifted-palace-468618-q5/web-app:$IMAGE_TAG

  build_push_batch:
    name: Build & Push Batch Image
    runs-on: ubuntu-latest
    needs: set_image_tag
    env:
      IMAGE_TAG: ${{ needs.set_image_tag.outputs.image_tag }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to GAR
        run: gcloud auth configure-docker gcr.io
      - name: Set short image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Authenticate Docker to gcr.io
      #   run: gcloud auth configure-docker gcr.io
      # --- JFrog Artifactory build & push (commented for future use) ---
      # - name: Log in to JFrog Artifactory Docker registry
      #   run: |
      #     JF_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed 's~https\?://~~')
      #     echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
      #     echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      # - name: Build & Tag Batch Image for JFrog
      #   run: docker build -t $JF_REGISTRY/ceosvr-docker/batch-app:$IMAGE_TAG ./batch-app
      # - name: Push Batch Image to JFrog
      #   run: docker push $JF_REGISTRY/ceosvr-docker/batch-app:$IMAGE_TAG
      # --- End JFrog steps ---
      - name: Build & Tag Batch Image for GAR
        run: docker build -t gcr.io/gifted-palace-468618-q5/batch-app:$IMAGE_TAG ./batch-app
      - name: Push Batch Image to GAR
        run: docker push gcr.io/gifted-palace-468618-q5/batch-app:$IMAGE_TAG
  build_push_api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: set_image_tag
    env:
      IMAGE_TAG: ${{ needs.set_image_tag.outputs.image_tag }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to GAR
        run: gcloud auth configure-docker gcr.io
      - name: Set short image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
