
name: Deploy Infra and Apps (GCP Cloud Run Suite)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api-app/**'
      - 'web-app/**'
      - 'batch-app/**'
      - '.github/workflows/deploy-infra-apps.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  CONTAINER_REGISTRY: gcr.io
  IMAGE_TAG: ${{ github.sha }}
  ENVIRONMENT: prod




jobs:
  build_push_web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Authenticate Docker to gcr.io
      #   run: gcloud auth configure-docker gcr.io
      - name: Log in to JFrog Artifactory Docker registry
        run: |
          JF_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed 's~https\?://~~')
          echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
          echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      - name: Build & Tag Web Image
        run: |
          docker build -t $JF_REGISTRY/svr-docker/web-app:$IMAGE_TAG ./web-app

      - name: Push Web Image to JFrog
        run: docker push $JF_REGISTRY/svr-docker/web-app:$IMAGE_TAG
      # Artifact Registry (GAR) authentication and push
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Tag Web Image for Artifact Registry
        run: docker tag $JF_REGISTRY/svr-docker/web-app:$IMAGE_TAG us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/web-app:$IMAGE_TAG
      - name: Push Web Image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/web-app:$IMAGE_TAG

      # --- Artifact Registry (GAR) steps ---
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Tag Web Image for Artifact Registry
        run: docker tag $JF_REGISTRY/svr-docker/web-app:$IMAGE_TAG us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/web-app:$IMAGE_TAG
      - name: Push Web Image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/web-app:$IMAGE_TAG

  build_push_batch:
    name: Build & Push Batch Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Authenticate Docker to gcr.io
      #   run: gcloud auth configure-docker gcr.io
      - name: Log in to JFrog Artifactory Docker registry
        run: |
          JF_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed 's~https\?://~~')
          echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
          echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      - name: Build & Tag Batch Image
        run: |
          docker build -t $JF_REGISTRY/svr-docker/batch-app:$IMAGE_TAG ./batch-app

      - name: Push Batch Image to JFrog
        run: docker push $JF_REGISTRY/svr-docker/batch-app:$IMAGE_TAG
      # Artifact Registry (GAR) authentication and push
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Tag Batch Image for Artifact Registry
        run: docker tag $JF_REGISTRY/svr-docker/batch-app:$IMAGE_TAG us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/batch-app:$IMAGE_TAG
      - name: Push Batch Image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/batch-app:$IMAGE_TAG

      # --- Artifact Registry (GAR) steps ---
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Tag Batch Image for Artifact Registry
        run: docker tag $JF_REGISTRY/svr-docker/batch-app:$IMAGE_TAG us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/batch-app:$IMAGE_TAG
      - name: Push Batch Image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/batch-app:$IMAGE_TAG
  build_push_api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GCR/GAR steps commented for future use
      # - uses: google-github-actions/auth@v2
      #   with:
      #     token_format: 'access_token'
      #     workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # - name: Authenticate Docker to gcr.io
      #   run: gcloud auth configure-docker gcr.io
      - name: Log in to JFrog Artifactory Docker registry
        run: |
          JF_REGISTRY=$(echo "${{ vars.JF_URL }}" | sed 's~https\?://~~')
          echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
          echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      - name: Build & Tag API Image
        run: |
          docker build -t $JF_REGISTRY/svr-docker/api-app:$IMAGE_TAG ./api-app

      - name: Push API Image to JFrog
        run: docker push $JF_REGISTRY/svr-docker/api-app:$IMAGE_TAG
      # Artifact Registry (GAR) authentication and push
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Tag API Image for Artifact Registry
        run: docker tag $JF_REGISTRY/svr-docker/api-app:$IMAGE_TAG us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/api-app:$IMAGE_TAG
      - name: Push API Image to Artifact Registry
        run: docker push us-central1-docker.pkg.dev/gifted-palace-468618-q5/svr-rem-art/api-app:$IMAGE_TAG

  deploy_infra:
    name: Terraform Apply (Deploy Infra & Cloud Run)
    runs-on: ubuntu-latest
    needs: [build_push_api, build_push_web, build_push_batch]
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=infra init
      - name: Wait for images to be available in GAR
        run: sleep 60
      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve
        env:
          GOOGLE_PROJECT: ${{ env.PROJECT_ID }}
          GOOGLE_REGION: ${{ env.REGION }}
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}

