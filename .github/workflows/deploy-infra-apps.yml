
name: Deploy Infra and Apps (GCP Cloud Run Suite)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api-app/**'
      - 'web-app/**'
      - 'batch-app/**'
      - '.github/workflows/deploy-infra-apps.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  CONTAINER_REGISTRY: gcr.io
  IMAGE_TAG: ${{ github.sha }}
  ENVIRONMENT: prod


jobs:
  terraform_infra:
    name: Terraform Init, Plan & Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan
      - name: Terraform Apply
        run: terraform apply -auto-approve



jobs:
  build_push_api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push API Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG ./api-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG

