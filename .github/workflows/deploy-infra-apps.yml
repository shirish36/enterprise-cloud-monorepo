name: Deploy Infra and Apps (GCP Cloud Run Suite)

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api-app/**'
      - 'web-app/**'
      - 'batch-app/**'
      - '.github/workflows/deploy-infra-apps.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  CONTAINER_REGISTRY: gcr.io
  IMAGE_TAG: ${{ github.sha }}
  ENVIRONMENT: prod

jobs:
  terraform_init_plan:
    name: Terraform Init & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform_init_plan
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply
        run: terraform apply -auto-approve

  build_push_api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: terraform_apply
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push API Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG ./api-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG

  deploy_api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    needs: build_push_api
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy enterprise-api-${{ env.ENVIRONMENT }} \
            --image $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account $PROJECT_ID-cloud-run-sa@$PROJECT_ID.iam.gserviceaccount.com

  build_push_web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    needs: terraform_apply
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push Web Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-web:$IMAGE_TAG ./web-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-web:$IMAGE_TAG

  deploy_web:
    name: Deploy Web Service
    runs-on: ubuntu-latest
    needs: build_push_web
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Deploy Web to Cloud Run
        run: |
          gcloud run deploy enterprise-web-${{ env.ENVIRONMENT }} \
            --image $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-web:$IMAGE_TAG \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account $PROJECT_ID-cloud-run-sa@$PROJECT_ID.iam.gserviceaccount.com

  build_push_batch:
    name: Build & Push Batch Image
    runs-on: ubuntu-latest
    needs: terraform_apply
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & Push Batch Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-batch:$IMAGE_TAG ./batch-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-batch:$IMAGE_TAG

  deploy_batch:
    name: Deploy Batch Job
    runs-on: ubuntu-latest
    needs: build_push_batch
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Deploy Batch Job to Cloud Run
        run: |
          gcloud run jobs update enterprise-batch-job-${{ env.ENVIRONMENT }} \
            --image $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-batch:$IMAGE_TAG \
            --region $REGION \
            --service-account $PROJECT_ID-cloud-run-sa@$PROJECT_ID.iam.gserviceaccount.com
