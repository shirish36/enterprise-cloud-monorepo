
name: Deploy Infra and Apps (GCP Cloud Run Suite)

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api-app/**'
      - 'web-app/**'
      - 'batch-app/**'
      - '.github/workflows/deploy-infra-apps.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  CONTAINER_REGISTRY: gcr.io
  IMAGE_TAG: ${{ github.sha }}
  ENVIRONMENT: prod




jobs:
  build_push_web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate Docker to gcr.io
        run: gcloud auth configure-docker gcr.io
      - name: Build & Push Web Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-web:$IMAGE_TAG ./web-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-web:$IMAGE_TAG

  build_push_batch:
    name: Build & Push Batch Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate Docker to gcr.io
        run: gcloud auth configure-docker gcr.io
      - name: Build & Push Batch Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-batch:$IMAGE_TAG ./batch-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-batch:$IMAGE_TAG
  build_push_api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authenticate Docker to gcr.io
        run: gcloud auth configure-docker gcr.io
      - name: Build & Push API Image
        run: |
          docker build -t $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG ./api-app
          docker push $CONTAINER_REGISTRY/$PROJECT_ID/enterprise-api:$IMAGE_TAG

