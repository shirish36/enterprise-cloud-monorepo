      #     echo "${{ secrets.JF_ACCESS_TOKEN }}" | docker login $JF_REGISTRY -u ${{ secrets.JF_USER }} --password-stdin
      #     echo "JF_REGISTRY=$JF_REGISTRY" >> $GITHUB_ENV
      # - name: Build & Tag API Image for JFrog
      #   run: docker build -t $JF_REGISTRY/ceosvr-docker/api-app:$IMAGE_TAG ./api-app
      # - name: Push API Image to JFrog
      #   run: docker push $JF_REGISTRY/ceosvr-docker/api-app:$IMAGE_TAG
      # --- End JFrog steps ---
      - name: Build & Tag API Image for GAR
        run: docker build -t gcr.io/gifted-palace-468618-q5/api-app:$IMAGE_TAG ./api-app
      - name: Push API Image to GAR
        run: docker push gcr.io/gifted-palace-468618-q5/api-app:$IMAGE_TAG

  deploy_infra:
    name: Terraform Apply (Deploy Infra & Cloud Run)
    runs-on: ubuntu-latest
    needs: [build_push_api, build_push_web, build_push_batch, set_image_tag]
    env:
      IMAGE_TAG: ${{ needs.set_image_tag.outputs.image_tag }}
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/283962084457/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@gifted-palace-468618-q5.iam.gserviceaccount.com'
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=infra init
      - name: Wait for images to be available in GAR
        run: sleep 60
      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve
        env:
          GOOGLE_PROJECT: ${{ env.PROJECT_ID }}
          GOOGLE_REGION: ${{ env.REGION }}
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: ${{ env.REGION }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}

